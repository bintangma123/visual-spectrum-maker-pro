<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Visual Spectrum Maker PRO V1.5</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
<div id="app">
<header id="header">
<div class="logo"><span>🎵</span><h1>Visual Spectrum Maker <b>PRO</b></h1><small>V1.5</small></div>
<nav id="nav"></nav>
<div class="header-right">
<span id="fps-display">60 FPS</span>
<span id="bpm-display">BPM --</span>
<button id="btn-fullscreen" title="Fullscreen (F)">⛶</button>
</div>
</header>
<main id="main">
<aside id="sidebar"></aside>
<section id="canvas-wrap">
<canvas id="canvas"></canvas>
<div id="drop-overlay"><span>Drop MP3, Image, or Video</span></div>
<div id="rec-badge" class="hidden">⏺ REC</div>
</section>
<aside id="props"></aside>
</main>
<footer id="footer">
<button id="btn-play">▶</button>
<button id="btn-pause">⏸</button>
<button id="btn-stop">⏹</button>
<button id="btn-mute">🔊</button>
<input type="range" id="volume" min="0" max="150" value="100">
<span id="time">00:00/00:00</span>
<input type="range" id="seek" min="0" max="1000" value="0">
</footer>
</div>
<script src="app.js"></script>
</body>
</html>
