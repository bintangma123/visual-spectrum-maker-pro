    <title>Visual Spectrum Maker PRO V1</title>
    <style>
/* Visual Spectrum Maker PRO - Main Stylesheet */
:root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a2e;
    --bg-panel: #16161e;
    --accent-primary: #6c5ce7;
    --accent-secondary: #a29bfe;
    --accent-glow: #7c3aed;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b0;
    --text-muted: #606070;
    --border-color: #2a2a3e;
    --success: #00d68f;
    --warning: #ffaa00;
    --danger: #ff6b6b;
    --neon-blue: #00f5ff;
    --neon-pink: #ff00ff;
    --neon-green: #39ff14;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --transition: all 0.3s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
}


/* Header */
#header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    gap: 20px;
    height: 52px;
    flex-shrink: 0;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-icon {
    font-size: 24px;
}

.logo h1 {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
}

.logo .pro {
    background: linear-gradient(135deg, var(--accent-primary), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
}

#main-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
}

.nav-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: var(--transition);
    white-space: nowrap;
}

.nav-btn:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.nav-btn.active {
    background: var(--accent-primary);
    color: white;
    box-shadow: 0 2px 10px rgba(108, 92, 231, 0.4);
}


/* Main Content */
#main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
}

#sidebar {
    width: 280px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border-color);
    overflow-y: auto;
    padding: 12px;
    flex-shrink: 0;
}

#canvas-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
}

#preview-canvas {
    width: 100%;
    height: 100%;
    display: block;
}

#canvas-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}

#canvas-overlay.active {
    opacity: 1;
    pointer-events: all;
    background: rgba(0, 0, 0, 0.7);
    border: 2px dashed var(--accent-primary);
}

.drop-text {
    font-size: 18px;
    color: var(--accent-secondary);
    font-weight: 600;
}

#properties-panel {
    width: 300px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-color);
    overflow-y: auto;
    padding: 12px;
    flex-shrink: 0;
}


/* Footer / Timeline */
#footer {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    padding: 8px 16px;
    flex-shrink: 0;
}

#timeline {
    height: 30px;
    background: var(--bg-tertiary);
    border-radius: var(--radius);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
}

#transport-controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

#transport-controls button {
    width: 32px;
    height: 32px;
    border: none;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    transition: var(--transition);
}

#transport-controls button:hover {
    background: var(--accent-primary);
    transform: scale(1.1);
}

#time-display {
    font-size: 12px;
    color: var(--text-secondary);
    font-family: monospace;
    min-width: 100px;
}

#seek-bar {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    background: var(--bg-tertiary);
    border-radius: 2px;
    outline: none;
}

#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent-primary);
    border-radius: 50%;
    cursor: pointer;
}

#bpm-display {
    font-size: 12px;
    color: var(--neon-blue);
    font-family: monospace;
    font-weight: 600;
}


/* Sidebar Components */
.panel-section {
    margin-bottom: 16px;
}

.panel-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-color);
}

.panel-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
}

.panel-item {
    padding: 8px;
    background: var(--bg-tertiary);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    transition: var(--transition);
    border: 1px solid transparent;
}

.panel-item:hover {
    border-color: var(--accent-primary);
    color: var(--text-primary);
    transform: translateY(-1px);
}

.panel-item.active {
    background: var(--accent-primary);
    color: white;
    border-color: var(--accent-primary);
}

.panel-item .icon {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
}

/* Controls */
.control-group {
    margin-bottom: 12px;
}

.control-group label {
    display: block;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
}

.control-group input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: var(--bg-tertiary);
    border-radius: 2px;
    outline: none;
}

.control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent-primary);
    border-radius: 50%;
    cursor: pointer;
}

.control-group input[type="color"] {
    width: 100%;
    height: 30px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
}

.control-group select {
    width: 100%;
    padding: 6px 8px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 12px;
}

.btn {
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: var(--transition);
}

.btn-primary {
    background: var(--accent-primary);
    color: white;
}

.btn-primary:hover {
    background: var(--accent-glow);
    box-shadow: 0 2px 15px rgba(108, 92, 231, 0.5);
}

.btn-success {
    background: var(--success);
    color: #000;
}

.btn-full {
    width: 100%;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 6px;
}

::-webkit-scrollbar-track {
    background: var(--bg-primary);
}

::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
}


/* Level Meters */
.level-meter {
    margin-bottom: 6px;
}

.level-meter label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.meter-bar {
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    overflow: hidden;
}

.meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-primary), var(--neon-blue));
    border-radius: 2px;
    transition: width 0.05s linear;
    width: 0%;
}

/* Drop Zone */
.drop-zone {
    cursor: pointer;
}

.drop-zone .panel-item {
    border: 2px dashed var(--border-color);
    background: transparent;
}

.drop-zone .panel-item:hover {
    border-color: var(--accent-primary);
    background: rgba(108, 92, 231, 0.1);
}

/* Timeline Waveform Display */
#timeline {
    background: var(--bg-tertiary);
    position: relative;
}

#timeline::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: rgba(108, 92, 231, 0.2);
    transition: width 0.1s linear;
}

/* Beat Flash Indicator */
.beat-flash {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(108, 92, 231, 0.1);
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
}

.beat-flash.active {
    opacity: 1;
}

/* Export Progress */
#export-progress {
    background: var(--bg-tertiary);
    border-radius: var(--radius);
    padding: 12px;
}

/* Template Items */
.panel-item[data-template] {
    position: relative;
    overflow: hidden;
}

.panel-item[data-template]::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent-primary);
    transform: scaleX(0);
    transition: transform 0.3s;
}

.panel-item[data-template]:hover::after {
    transform: scaleX(1);
}

/* Recording indicator */
.recording-indicator {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(255, 0, 0, 0.8);
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    animation: pulse-recording 1s infinite;
}

@keyframes pulse-recording {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Responsive adjustments */
@media (max-width: 1200px) {
    #sidebar { width: 240px; }
    #properties-panel { width: 240px; }
}

@media (max-width: 900px) {
    #properties-panel { display: none; }
    #sidebar { width: 220px; }
}

    <script type="module">
// src/audio/AudioEngine.ts
class AudioEngine {
  context = null;
  analyser = null;
  gainNode = null;
  source = null;
  audioBuffer = null;
  audioElement = null;
  frequencyData = new Uint8Array(0);
  timeDomainData = new Uint8Array(0);
  peakHold = [];
  smoothedData = new Float32Array(0);
  lastBeatTime = 0;
  beatHistory = [];
  bpm = 0;
  isPlaying = false;
  startTime = 0;
  pauseTime = 0;
  duration = 0;
  config = {
    fftSize: 2048,
    smoothing: 0.8,
    sensitivity: 1.5,
    gain: 1,
    beatThreshold: 0.6,
    peakDecay: 0.98
  };
  constructor() {}
  async initialize() {
    this.context = new AudioContext;
    this.analyser = this.context.createAnalyser();
    this.analyser.fftSize = this.config.fftSize;
    this.analyser.smoothingTimeConstant = this.config.smoothing;
    this.gainNode = this.context.createGain();
    this.gainNode.gain.value = this.config.gain;
    this.gainNode.connect(this.analyser);
    this.analyser.connect(this.context.destination);
    const bufferLength = this.analyser.frequencyBinCount;
    this.frequencyData = new Uint8Array(bufferLength);
    this.timeDomainData = new Uint8Array(bufferLength);
    this.peakHold = new Array(bufferLength).fill(0);
    this.smoothedData = new Float32Array(bufferLength);
  }
  async loadFile(file) {
    if (!this.context)
      await this.initialize();
    const arrayBuffer = await file.arrayBuffer();
    this.audioBuffer = await this.context.decodeAudioData(arrayBuffer);
    this.duration = this.audioBuffer.duration;
    const url = URL.createObjectURL(file);
    if (this.audioElement) {
      this.audioElement.pause();
      URL.revokeObjectURL(this.audioElement.src);
    }
    this.audioElement = new Audio(url);
    this.audioElement.crossOrigin = "anonymous";
  }
  play() {
    if (!this.context || !this.audioBuffer)
      return;
    if (this.context.state === "suspended")
      this.context.resume();
    this.stop();
    this.source = this.context.createBufferSource();
    this.source.buffer = this.audioBuffer;
    this.source.connect(this.gainNode);
    const offset = this.pauseTime;
    this.source.start(0, offset);
    this.startTime = this.context.currentTime - offset;
    this.isPlaying = true;
    this.source.onended = () => {
      if (this.isPlaying) {
        this.isPlaying = false;
        this.pauseTime = 0;
      }
    };
  }
  pause() {
    if (!this.isPlaying || !this.context)
      return;
    this.pauseTime = this.context.currentTime - this.startTime;
    this.source?.stop();
    this.isPlaying = false;
  }
  stop() {
    if (this.source) {
      try {
        this.source.stop();
      } catch (e) {}
      this.source.disconnect();
      this.source = null;
    }
    this.isPlaying = false;
    this.pauseTime = 0;
  }
  seek(time) {
    const wasPlaying = this.isPlaying;
    this.stop();
    this.pauseTime = time;
    if (wasPlaying)
      this.play();
  }
  getCurrentTime() {
    if (!this.context)
      return 0;
    if (this.isPlaying) {
      return this.context.currentTime - this.startTime;
    }
    return this.pauseTime;
  }
  getDuration() {
    return this.duration;
  }
  getIsPlaying() {
    return this.isPlaying;
  }
  getAudioBuffer() {
    return this.audioBuffer;
  }
  analyze() {
    if (!this.analyser) {
      return this.getEmptyAnalysis();
    }
    this.analyser.getByteFrequencyData(this.frequencyData);
    this.analyser.getByteTimeDomainData(this.timeDomainData);
    const sensitivity = this.config.sensitivity;
    const bufferLength = this.frequencyData.length;
    const bassEnd = Math.floor(bufferLength * 0.1);
    const midEnd = Math.floor(bufferLength * 0.5);
    let bassSum = 0, midSum = 0, trebleSum = 0, totalSum = 0;
    for (let i = 0;i < bufferLength; i++) {
      const value = this.frequencyData[i] / 255 * sensitivity;
      totalSum += value;
      this.smoothedData[i] = this.smoothedData[i] * 0.7 + value * 0.3;
      if (value > this.peakHold[i]) {
        this.peakHold[i] = value;
      } else {
        this.peakHold[i] *= this.config.peakDecay;
      }
      if (i < bassEnd)
        bassSum += value;
      else if (i < midEnd)
        midSum += value;
      else
        trebleSum += value;
    }
    const bassLevel = bassSum / bassEnd;
    const midLevel = midSum / (midEnd - bassEnd);
    const trebleLevel = trebleSum / (bufferLength - midEnd);
    const overallLevel = totalSum / bufferLength;
    const isBeat = this.detectBeat(bassLevel);
    const isKick = bassLevel > this.config.beatThreshold * 1.2;
    const isSnare = midLevel > this.config.beatThreshold && trebleLevel > this.config.beatThreshold * 0.8;
    return {
      frequencyData: this.frequencyData,
      timeDomainData: this.timeDomainData,
      bassLevel: Math.min(bassLevel, 1),
      midLevel: Math.min(midLevel, 1),
      trebleLevel: Math.min(trebleLevel, 1),
      overallLevel: Math.min(overallLevel, 1),
      isBeat,
      isKick,
      isSnare,
      bpm: this.bpm,
      peakHold: this.peakHold,
      smoothedData: this.smoothedData
    };
  }
  detectBeat(currentLevel) {
    const now = performance.now();
    if (currentLevel > this.config.beatThreshold && now - this.lastBeatTime > 200) {
      if (this.lastBeatTime > 0) {
        const interval = now - this.lastBeatTime;
        this.beatHistory.push(interval);
        if (this.beatHistory.length > 20)
          this.beatHistory.shift();
        const avgInterval = this.beatHistory.reduce((a, b) => a + b, 0) / this.beatHistory.length;
        this.bpm = Math.round(60000 / avgInterval);
      }
      this.lastBeatTime = now;
      return true;
    }
    return false;
  }
  getEmptyAnalysis() {
    return {
      frequencyData: new Uint8Array(1024),
      timeDomainData: new Uint8Array(1024),
      bassLevel: 0,
      midLevel: 0,
      trebleLevel: 0,
      overallLevel: 0,
      isBeat: false,
      isKick: false,
      isSnare: false,
      bpm: 0,
      peakHold: [],
      smoothedData: new Float32Array(1024)
    };
  }
  setGain(value) {
    this.config.gain = value;
    if (this.gainNode)
      this.gainNode.gain.value = value;
  }
  setSensitivity(value) {
    this.config.sensitivity = value;
  }
  setSmoothing(value) {
    this.config.smoothing = value;
    if (this.analyser)
      this.analyser.smoothingTimeConstant = value;
  }
  setBeatThreshold(value) {
    this.config.beatThreshold = value;
  }
  destroy() {
    this.stop();
    if (this.context) {
      this.context.close();
      this.context = null;
    }
  }
}

// src/visualizers/BaseVisualizer.ts
class BaseVisualizer {
  ctx;
  width;
  height;
  config;
  constructor(ctx, width, height) {
    this.ctx = ctx;
    this.width = width;
    this.height = height;
    this.config = {
      barCount: 64,
      barWidth: 4,
      barGap: 2,
      barRadius: 2,
      color: "#6c5ce7",
      gradientColors: ["#6c5ce7", "#a29bfe", "#00f5ff"],
      useGradient: true,
      mirrorMode: false,
      opacity: 1,
      glowIntensity: 0.5,
      reactivity: 1,
      rotation: 0,
      scale: 1
    };
  }
  createGradient(x0, y0, x1, y1) {
    const gradient = this.ctx.createLinearGradient(x0, y0, x1, y1);
    const colors = this.config.gradientColors;
    colors.forEach((color, i) => {
      gradient.addColorStop(i / (colors.length - 1), color);
    });
    return gradient;
  }
  applyGlow() {
    if (this.config.glowIntensity > 0) {
      this.ctx.shadowBlur = this.config.glowIntensity * 20;
      this.ctx.shadowColor = this.config.color;
    }
  }
  clearGlow() {
    this.ctx.shadowBlur = 0;
  }
  resize(width, height) {
    this.width = width;
    this.height = height;
  }
}

// src/visualizers/VerticalBars.ts
class VerticalBarsVisualizer extends BaseVisualizer {
  render(data) {
    const { frequencyData } = data;
    const barCount = this.config.barCount;
    const totalWidth = this.width;
    const barWidth = totalWidth / barCount - this.config.barGap;
    const centerY = this.height;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    this.applyGlow();
    for (let i = 0;i < barCount; i++) {
      const dataIndex = Math.floor(i * frequencyData.length / barCount);
      const value = frequencyData[dataIndex] / 255 * this.config.reactivity;
      const barHeight = value * this.height * 0.8;
      const x = i * (barWidth + this.config.barGap);
      const y = centerY - barHeight;
      if (this.config.useGradient) {
        this.ctx.fillStyle = this.createGradient(x, centerY, x, y);
      } else {
        this.ctx.fillStyle = this.config.color;
      }
      this.drawRoundedBar(x, y, barWidth, barHeight);
      if (this.config.mirrorMode) {
        this.ctx.globalAlpha = this.config.opacity * 0.4;
        this.drawRoundedBar(x, centerY, barWidth, barHeight * 0.3);
        this.ctx.globalAlpha = this.config.opacity;
      }
    }
    this.clearGlow();
    this.ctx.restore();
  }
  drawRoundedBar(x, y, w, h) {
    const r = Math.min(this.config.barRadius, w / 2);
    this.ctx.beginPath();
    this.ctx.moveTo(x + r, y);
    this.ctx.lineTo(x + w - r, y);
    this.ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    this.ctx.lineTo(x + w, y + h);
    this.ctx.lineTo(x, y + h);
    this.ctx.lineTo(x, y + r);
    this.ctx.quadraticCurveTo(x, y, x + r, y);
    this.ctx.closePath();
    this.ctx.fill();
  }
}

// src/visualizers/CircularSpectrum.ts
class CircularSpectrumVisualizer extends BaseVisualizer {
  rotation = 0;
  render(data) {
    const { frequencyData, bassLevel } = data;
    const centerX = this.width / 2;
    const centerY = this.height / 2;
    const radius = Math.min(this.width, this.height) * 0.25;
    const barCount = this.config.barCount;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    this.applyGlow();
    this.rotation += 0.002 + bassLevel * 0.01;
    for (let i = 0;i < barCount; i++) {
      const dataIndex = Math.floor(i * frequencyData.length / barCount);
      const value = frequencyData[dataIndex] / 255 * this.config.reactivity;
      const angle = i / barCount * Math.PI * 2 + this.rotation;
      const barLength = value * radius * 1.5;
      const x1 = centerX + Math.cos(angle) * radius;
      const y1 = centerY + Math.sin(angle) * radius;
      const x2 = centerX + Math.cos(angle) * (radius + barLength);
      const y2 = centerY + Math.sin(angle) * (radius + barLength);
      if (this.config.useGradient) {
        const gradient = this.ctx.createLinearGradient(x1, y1, x2, y2);
        const colors = this.config.gradientColors;
        colors.forEach((color, idx) => {
          gradient.addColorStop(idx / (colors.length - 1), color);
        });
        this.ctx.strokeStyle = gradient;
      } else {
        this.ctx.strokeStyle = this.config.color;
      }
      this.ctx.lineWidth = this.config.barWidth;
      this.ctx.lineCap = "round";
      this.ctx.beginPath();
      this.ctx.moveTo(x1, y1);
      this.ctx.lineTo(x2, y2);
      this.ctx.stroke();
      if (this.config.mirrorMode) {
        const x3 = centerX + Math.cos(angle) * (radius - barLength * 0.4);
        const y3 = centerY + Math.sin(angle) * (radius - barLength * 0.4);
        this.ctx.globalAlpha = this.config.opacity * 0.5;
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);
        this.ctx.lineTo(x3, y3);
        this.ctx.stroke();
        this.ctx.globalAlpha = this.config.opacity;
      }
    }
    this.ctx.beginPath();
    this.ctx.arc(centerX, centerY, radius * (0.9 + bassLevel * 0.1), 0, Math.PI * 2);
    this.ctx.strokeStyle = this.config.color;
    this.ctx.lineWidth = 2;
    this.ctx.stroke();
    this.clearGlow();
    this.ctx.restore();
  }
}

// src/visualizers/WaveformVisualizer.ts
class WaveformVisualizer extends BaseVisualizer {
  render(data) {
    const { timeDomainData, bassLevel } = data;
    const centerY = this.height / 2;
    const amplitude = this.height * 0.35 * this.config.reactivity;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    this.applyGlow();
    this.ctx.beginPath();
    this.ctx.lineWidth = 2 + bassLevel * 2;
    this.ctx.lineCap = "round";
    this.ctx.lineJoin = "round";
    if (this.config.useGradient) {
      this.ctx.strokeStyle = this.createGradient(0, centerY - amplitude, this.width, centerY + amplitude);
    } else {
      this.ctx.strokeStyle = this.config.color;
    }
    const sliceWidth = this.width / timeDomainData.length;
    let x = 0;
    for (let i = 0;i < timeDomainData.length; i++) {
      const v = timeDomainData[i] / 128;
      const y = centerY + (v - 1) * amplitude;
      if (i === 0) {
        this.ctx.moveTo(x, y);
      } else {
        this.ctx.lineTo(x, y);
      }
      x += sliceWidth;
    }
    this.ctx.stroke();
    if (this.config.mirrorMode) {
      this.ctx.globalAlpha = this.config.opacity * 0.3;
      this.ctx.beginPath();
      x = 0;
      for (let i = 0;i < timeDomainData.length; i++) {
        const v = timeDomainData[i] / 128;
        const y = centerY - (v - 1) * amplitude * 0.5;
        if (i === 0)
          this.ctx.moveTo(x, y);
        else
          this.ctx.lineTo(x, y);
        x += sliceWidth;
      }
      this.ctx.stroke();
    }
    this.clearGlow();
    this.ctx.restore();
  }
}

// src/visualizers/NeonSpectrum.ts
class NeonSpectrumVisualizer extends BaseVisualizer {
  render(data) {
    const { frequencyData, bassLevel } = data;
    const barCount = this.config.barCount;
    const totalWidth = this.width * 0.8;
    const barWidth = totalWidth / barCount - this.config.barGap;
    const startX = (this.width - totalWidth) / 2;
    const baseY = this.height * 0.65;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    for (let pass = 0;pass < 3; pass++) {
      const blur = [20, 10, 0][pass];
      const alpha = [0.3, 0.6, 1][pass];
      this.ctx.shadowBlur = blur;
      this.ctx.shadowColor = this.config.gradientColors[0];
      this.ctx.globalAlpha = this.config.opacity * alpha;
      for (let i = 0;i < barCount; i++) {
        const dataIndex = Math.floor(i * frequencyData.length / barCount);
        const value = frequencyData[dataIndex] / 255 * this.config.reactivity;
        const barHeight = value * this.height * 0.5;
        const x = startX + i * (barWidth + this.config.barGap);
        const y = baseY - barHeight;
        const hue = i / barCount * 120 + 240;
        const saturation = 80 + value * 20;
        const lightness = 50 + value * 20;
        this.ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        this.ctx.fillRect(x, y, barWidth, barHeight);
      }
    }
    this.ctx.globalAlpha = this.config.opacity * 0.2;
    this.ctx.shadowBlur = 5;
    for (let i = 0;i < barCount; i++) {
      const dataIndex = Math.floor(i * frequencyData.length / barCount);
      const value = frequencyData[dataIndex] / 255 * this.config.reactivity;
      const barHeight = value * this.height * 0.15;
      const x = startX + i * (barWidth + this.config.barGap);
      const hue = i / barCount * 120 + 240;
      this.ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
      this.ctx.fillRect(x, baseY + 2, barWidth, barHeight);
    }
    if (bassLevel > 0.5) {
      this.ctx.globalAlpha = (bassLevel - 0.5) * 0.4;
      this.ctx.strokeStyle = this.config.gradientColors[0];
      this.ctx.lineWidth = 2;
      this.ctx.shadowBlur = 30;
      this.ctx.beginPath();
      this.ctx.arc(this.width / 2, baseY, totalWidth / 2 * bassLevel, 0, Math.PI * 2);
      this.ctx.stroke();
    }
    this.ctx.restore();
  }
}

// src/visualizers/MirrorBars.ts
class MirrorBarsVisualizer extends BaseVisualizer {
  render(data) {
    const { frequencyData } = data;
    const barCount = this.config.barCount;
    const totalWidth = this.width * 0.9;
    const barWidth = totalWidth / barCount - this.config.barGap;
    const startX = (this.width - totalWidth) / 2;
    const centerY = this.height / 2;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    this.applyGlow();
    for (let i = 0;i < barCount; i++) {
      const dataIndex = Math.floor(i * frequencyData.length / barCount);
      const value = frequencyData[dataIndex] / 255 * this.config.reactivity;
      const barHeight = value * this.height * 0.4;
      const x = startX + i * (barWidth + this.config.barGap);
      if (this.config.useGradient) {
        this.ctx.fillStyle = this.createGradient(x, centerY - barHeight, x, centerY + barHeight);
      } else {
        this.ctx.fillStyle = this.config.color;
      }
      this.ctx.fillRect(x, centerY - barHeight, barWidth, barHeight);
      this.ctx.fillRect(x, centerY, barWidth, barHeight);
    }
    this.ctx.strokeStyle = this.config.color;
    this.ctx.lineWidth = 1;
    this.ctx.globalAlpha = 0.3;
    this.ctx.beginPath();
    this.ctx.moveTo(startX, centerY);
    this.ctx.lineTo(startX + totalWidth, centerY);
    this.ctx.stroke();
    this.clearGlow();
    this.ctx.restore();
  }
}

// src/visualizers/ParticleBurst.ts
class ParticleBurstVisualizer extends BaseVisualizer {
  particles = [];
  render(data) {
    const { frequencyData, bassLevel, isBeat } = data;
    const centerX = this.width / 2;
    const centerY = this.height / 2;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    if (isBeat) {
      const count = Math.floor(20 + bassLevel * 40);
      for (let i = 0;i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6 * bassLevel;
        const hue = Math.random() * 60 + 240;
        this.particles.push({
          x: centerX,
          y: centerY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 1 + Math.random() * 3,
          life: 1,
          maxLife: 0.5 + Math.random() * 1.5,
          color: `hsl(${hue}, 80%, 60%)`
        });
      }
    }
    const barCount = 32;
    for (let i = 0;i < barCount; i++) {
      const dataIndex = Math.floor(i * frequencyData.length / barCount);
      const value = frequencyData[dataIndex] / 255;
      if (value > 0.6 && Math.random() > 0.7) {
        const angle = i / barCount * Math.PI * 2;
        const radius = Math.min(this.width, this.height) * 0.2;
        this.particles.push({
          x: centerX + Math.cos(angle) * radius,
          y: centerY + Math.sin(angle) * radius,
          vx: Math.cos(angle) * value * 3,
          vy: Math.sin(angle) * value * 3,
          size: value * 3,
          life: 1,
          maxLife: 1 + Math.random(),
          color: this.config.gradientColors[Math.floor(Math.random() * this.config.gradientColors.length)]
        });
      }
    }
    for (let i = this.particles.length - 1;i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= 0.016 / p.maxLife;
      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }
      this.ctx.globalAlpha = p.life * this.config.opacity;
      this.ctx.shadowBlur = 10;
      this.ctx.shadowColor = p.color;
      this.ctx.fillStyle = p.color;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      this.ctx.fill();
    }
    if (this.particles.length > 500) {
      this.particles = this.particles.slice(-500);
    }
    const gradient = this.ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100 + bassLevel * 50);
    gradient.addColorStop(0, `rgba(108, 92, 231, ${bassLevel * 0.3})`);
    gradient.addColorStop(1, "rgba(108, 92, 231, 0)");
    this.ctx.fillStyle = gradient;
    this.ctx.fillRect(0, 0, this.width, this.height);
    this.ctx.restore();
  }
}

// src/visualizers/EnergyRing.ts
class EnergyRingVisualizer extends BaseVisualizer {
  rings = [];
  time = 0;
  render(data) {
    const { frequencyData, bassLevel, isBeat, overallLevel } = data;
    const centerX = this.width / 2;
    const centerY = this.height / 2;
    const maxRadius = Math.min(this.width, this.height) * 0.4;
    this.ctx.save();
    this.ctx.globalAlpha = this.config.opacity;
    this.time += 0.02;
    if (isBeat) {
      this.rings.push({ radius: 20, opacity: 1, width: 3 + bassLevel * 5 });
    }
    const ringCount = 5;
    for (let r = 0;r < ringCount; r++) {
      const dataStart = Math.floor(r * frequencyData.length / ringCount);
      const dataEnd = Math.floor((r + 1) * frequencyData.length / ringCount);
      let avg = 0;
      for (let i = dataStart;i < dataEnd; i++)
        avg += frequencyData[i];
      avg = avg / (dataEnd - dataStart) / 255;
      const radius = (r + 1) * (maxRadius / ringCount) * (0.8 + avg * 0.4);
      const hue = 260 + r * 30;
      this.ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${avg * 0.8})`;
      this.ctx.lineWidth = 1 + avg * 3;
      this.ctx.shadowBlur = avg * 15;
      this.ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
      this.ctx.beginPath();
      for (let a = 0;a <= Math.PI * 2; a += 0.05) {
        const freqIdx = Math.floor(a / (Math.PI * 2) * (dataEnd - dataStart)) + dataStart;
        const freqVal = frequencyData[freqIdx] / 255 * this.config.reactivity;
        const wave = Math.sin(a * 8 + this.time * 2) * freqVal * 10;
        const px = centerX + Math.cos(a) * (radius + wave);
        const py = centerY + Math.sin(a) * (radius + wave);
        if (a === 0)
          this.ctx.moveTo(px, py);
        else
          this.ctx.lineTo(px, py);
      }
      this.ctx.closePath();
      this.ctx.stroke();
    }
    for (let i = this.rings.length - 1;i >= 0; i--) {
      const ring = this.rings[i];
      ring.radius += 3;
      ring.opacity -= 0.015;
      if (ring.opacity <= 0) {
        this.rings.splice(i, 1);
        continue;
      }
      this.ctx.strokeStyle = `rgba(162, 155, 254, ${ring.opacity})`;
      this.ctx.lineWidth = ring.width * ring.opacity;
      this.ctx.shadowBlur = 10;
      this.ctx.shadowColor = "rgba(162, 155, 254, 0.5)";
      this.ctx.beginPath();
      this.ctx.arc(centerX, centerY, ring.radius, 0, Math.PI * 2);
      this.ctx.stroke();
    }
    const coreSize = 15 + overallLevel * 20;
    const coreGradient = this.ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreSize);
    coreGradient.addColorStop(0, `rgba(255, 255, 255, ${0.8 + bassLevel * 0.2})`);
    coreGradient.addColorStop(0.3, `rgba(108, 92, 231, ${0.6})`);
    coreGradient.addColorStop(1, "rgba(108, 92, 231, 0)");
    this.ctx.fillStyle = coreGradient;
    this.ctx.beginPath();
    this.ctx.arc(centerX, centerY, coreSize, 0, Math.PI * 2);
    this.ctx.fill();
    if (this.rings.length > 20)
      this.rings = this.rings.slice(-20);
    this.ctx.restore();
  }
}

// src/particles/ParticleEngine.ts
class ParticleEngine {
  particles = [];
  width;
  height;
  config;
  constructor(width, height) {
    this.width = width;
    this.height = height;
    this.config = {
      type: "dust",
      count: 100,
      speed: 1,
      size: 3,
      opacity: 0.6,
      reactToMusic: true,
      reactivity: 1,
      color: "#ffffff",
      colors: ["#ffffff", "#a29bfe", "#6c5ce7", "#00f5ff"]
    };
  }
  initialize() {
    this.particles = [];
    for (let i = 0;i < this.config.count; i++) {
      this.particles.push(this.createParticle());
    }
  }
  createParticle(fromTop = false) {
    const type = this.config.type;
    const color = this.config.colors[Math.floor(Math.random() * this.config.colors.length)];
    let x = Math.random() * this.width;
    let y = fromTop ? -10 : Math.random() * this.height;
    let vx = 0, vy = 0;
    switch (type) {
      case "snow":
        vx = (Math.random() - 0.5) * 0.5;
        vy = 0.5 + Math.random() * 1.5;
        break;
      case "rain":
        vx = -1;
        vy = 8 + Math.random() * 4;
        break;
      case "fireflies":
        vx = (Math.random() - 0.5) * 2;
        vy = (Math.random() - 0.5) * 2;
        break;
      case "bubbles":
        vx = (Math.random() - 0.5) * 0.5;
        vy = -(0.5 + Math.random() * 1.5);
        y = fromTop ? this.height + 10 : y;
        break;
      case "sparks":
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        vx = Math.cos(angle) * speed;
        vy = Math.sin(angle) * speed;
        x = this.width / 2;
        y = this.height / 2;
        break;
      case "stars":
        vx = 0;
        vy = 0;
        break;
      case "galaxy":
        vx = (Math.random() - 0.5) * 0.3;
        vy = (Math.random() - 0.5) * 0.3;
        break;
      case "smoke":
        vx = (Math.random() - 0.5) * 0.5;
        vy = -(0.3 + Math.random() * 0.5);
        y = this.height;
        break;
      default:
        vx = (Math.random() - 0.5) * this.config.speed;
        vy = (Math.random() - 0.5) * this.config.speed;
        break;
    }
    return {
      x,
      y,
      vx,
      vy,
      size: this.config.size * (0.5 + Math.random()),
      life: 1,
      opacity: this.config.opacity * (0.5 + Math.random() * 0.5),
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.05,
      color,
      type
    };
  }
  update(data) {
    const { bassLevel, overallLevel, isBeat } = data;
    const musicFactor = this.config.reactToMusic ? overallLevel * this.config.reactivity : 0;
    if (isBeat && this.config.reactToMusic && this.particles.length < this.config.count * 2) {
      for (let i = 0;i < 5; i++) {
        this.particles.push(this.createParticle(true));
      }
    }
    for (let i = this.particles.length - 1;i >= 0; i--) {
      const p = this.particles[i];
      const speedMult = 1 + musicFactor * 2;
      p.x += p.vx * speedMult * this.config.speed;
      p.y += p.vy * speedMult * this.config.speed;
      p.rotation += p.rotationSpeed;
      switch (p.type) {
        case "fireflies":
          p.vx += (Math.random() - 0.5) * 0.1;
          p.vy += (Math.random() - 0.5) * 0.1;
          p.opacity = this.config.opacity * (0.3 + Math.sin(Date.now() * 0.003 + i) * 0.7);
          break;
        case "stars":
          p.opacity = this.config.opacity * (0.5 + Math.sin(Date.now() * 0.002 + i) * 0.5);
          p.size = this.config.size * (0.8 + bassLevel * 0.5);
          break;
        case "galaxy":
          const cx = this.width / 2;
          const cy = this.height / 2;
          const angle = Math.atan2(p.y - cy, p.x - cx);
          p.vx += Math.cos(angle + Math.PI / 2) * 0.01;
          p.vy += Math.sin(angle + Math.PI / 2) * 0.01;
          break;
        case "sparks":
          p.life -= 0.01;
          p.vy += 0.05;
          break;
        case "smoke":
          p.life -= 0.005;
          p.size += 0.1;
          p.opacity *= 0.995;
          break;
      }
      const margin = 50;
      if (p.x < -margin || p.x > this.width + margin || p.y < -margin || p.y > this.height + margin || p.life <= 0 || p.opacity <= 0.01) {
        this.particles[i] = this.createParticle(true);
      }
    }
  }
  render(ctx) {
    ctx.save();
    for (const p of this.particles) {
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 5;
      ctx.shadowColor = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      switch (p.type) {
        case "dust":
        case "fog":
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
          break;
        case "snow":
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
          break;
        case "rain":
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(1, p.size * 3);
          ctx.stroke();
          break;
        case "fireflies":
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
          break;
        case "bubbles":
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.stroke();
          break;
        case "sparks":
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(0, 0, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
          break;
        case "stars":
          this.drawStar(ctx, 0, 0, p.size);
          break;
        case "hearts":
          this.drawHeart(ctx, 0, 0, p.size);
          break;
        case "notes":
          ctx.font = `${p.size * 4}px serif`;
          ctx.fillText("♪", 0, 0);
          break;
        default:
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore();
  }
  drawStar(ctx, x, y, size) {
    ctx.beginPath();
    for (let i = 0;i < 5; i++) {
      const angle = i * 4 * Math.PI / 5 - Math.PI / 2;
      const px = x + Math.cos(angle) * size;
      const py = y + Math.sin(angle) * size;
      if (i === 0)
        ctx.moveTo(px, py);
      else
        ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  }
  drawHeart(ctx, x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size * 0.3);
    ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size * 0.3);
    ctx.bezierCurveTo(x - size, y + size * 0.6, x, y + size, x, y + size * 1.2);
    ctx.bezierCurveTo(x, y + size, x + size, y + size * 0.6, x + size, y + size * 0.3);
    ctx.bezierCurveTo(x + size, y, x, y, x, y + size * 0.3);
    ctx.fill();
  }
  resize(width, height) {
    this.width = width;
    this.height = height;
  }
  setType(type) {
    this.config.type = type;
    this.initialize();
  }
}

// src/effects/LightingEffects.ts
class LightingEffects {
  config = {
    glow: false,
    glowIntensity: 0.5,
    bloom: false,
    bloomIntensity: 0.3,
    lensFlare: false,
    lensFlareIntensity: 0.5,
    vignette: true,
    vignetteIntensity: 0.4,
    chromaticAberration: false,
    chromaticOffset: 2,
    neonEdge: false,
    ambientLight: false,
    ambientColor: "#6c5ce7"
  };
  apply(ctx, width, height, data) {
    if (this.config.vignette) {
      this.applyVignette(ctx, width, height, data);
    }
    if (this.config.bloom) {
      this.applyBloom(ctx, width, height, data);
    }
    if (this.config.lensFlare) {
      this.applyLensFlare(ctx, width, height, data);
    }
    if (this.config.ambientLight) {
      this.applyAmbientLight(ctx, width, height, data);
    }
  }
  applyVignette(ctx, w, h, data) {
    const intensity = this.config.vignetteIntensity * (1 + data.bassLevel * 0.3);
    const gradient = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.7);
    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(1, `rgba(0,0,0,${intensity})`);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }
  applyBloom(ctx, w, h, data) {
    const intensity = this.config.bloomIntensity * (0.5 + data.overallLevel * 0.5);
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    ctx.globalAlpha = intensity;
    ctx.filter = `blur(${8 + data.bassLevel * 10}px)`;
    ctx.drawImage(ctx.canvas, 0, 0);
    ctx.restore();
  }
  applyLensFlare(ctx, w, h, data) {
    if (data.bassLevel < 0.4)
      return;
    const intensity = (data.bassLevel - 0.4) * this.config.lensFlareIntensity;
    const cx = w * 0.6;
    const cy = h * 0.3;
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100 + intensity * 200);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${intensity * 0.5})`);
    gradient.addColorStop(0.2, `rgba(200, 180, 255, ${intensity * 0.3})`);
    gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    for (let i = 0;i < 3; i++) {
      const fx = cx + (w / 2 - cx) * (i + 1) * 0.4;
      const fy = cy + (h / 2 - cy) * (i + 1) * 0.4;
      const size = 20 + i * 15;
      const g2 = ctx.createRadialGradient(fx, fy, 0, fx, fy, size);
      g2.addColorStop(0, `rgba(108, 92, 231, ${intensity * 0.3})`);
      g2.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = g2;
      ctx.fillRect(fx - size, fy - size, size * 2, size * 2);
    }
    ctx.restore();
  }
  applyAmbientLight(ctx, w, h, data) {
    ctx.save();
    ctx.globalCompositeOperation = "overlay";
    ctx.globalAlpha = 0.1 + data.overallLevel * 0.15;
    ctx.fillStyle = this.config.ambientColor;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }
}

// src/effects/CameraEffects.ts
class CameraEffects {
  time = 0;
  punchDecay = 0;
  config = {
    autoZoom: false,
    autoZoomSpeed: 0.001,
    bassZoom: true,
    bassZoomIntensity: 0.05,
    beatPunch: true,
    beatPunchIntensity: 0.03,
    shake: false,
    shakeIntensity: 2,
    rotate: false,
    rotateSpeed: 0.0005
  };
  getTransform(data) {
    this.time += 0.016;
    let translateX = 0, translateY = 0, scale = 1, rotation = 0;
    if (this.config.autoZoom) {
      scale += Math.sin(this.time * this.config.autoZoomSpeed * 60) * 0.02;
    }
    if (this.config.bassZoom) {
      scale += data.bassLevel * this.config.bassZoomIntensity;
    }
    if (this.config.beatPunch) {
      if (data.isBeat) {
        this.punchDecay = this.config.beatPunchIntensity;
      }
      scale += this.punchDecay;
      this.punchDecay *= 0.9;
    }
    if (this.config.shake) {
      const intensity = this.config.shakeIntensity * data.bassLevel;
      translateX += (Math.random() - 0.5) * intensity;
      translateY += (Math.random() - 0.5) * intensity;
    }
    if (this.config.rotate) {
      rotation = this.time * this.config.rotateSpeed * 60;
    }
    return { translateX, translateY, scale, rotation };
  }
  applyTransform(ctx, width, height, transform) {
    ctx.translate(width / 2 + transform.translateX, height / 2 + transform.translateY);
    ctx.scale(transform.scale, transform.scale);
    ctx.rotate(transform.rotation);
    ctx.translate(-width / 2, -height / 2);
  }
}

// src/effects/OverlayEffects.ts
class OverlayEffects {
  config = {
    type: "none",
    intensity: 0.3
  };
  time = 0;
  apply(ctx, width, height, data) {
    this.time += 0.016;
    switch (this.config.type) {
      case "grain":
        this.applyGrain(ctx, width, height);
        break;
      case "vhs":
        this.applyVHS(ctx, width, height);
        break;
      case "scanline":
        this.applyScanlines(ctx, width, height);
        break;
      case "crt":
        this.applyCRT(ctx, width, height);
        break;
      case "noise":
        this.applyNoise(ctx, width, height);
        break;
      case "bokeh":
        this.applyBokeh(ctx, width, height, data);
        break;
    }
  }
  applyGrain(ctx, w, h) {
    const imageData = ctx.getImageData(0, 0, w, h);
    const pixels = imageData.data;
    const intensity = this.config.intensity * 30;
    for (let i = 0;i < pixels.length; i += 4) {
      const noise = (Math.random() - 0.5) * intensity;
      pixels[i] += noise;
      pixels[i + 1] += noise;
      pixels[i + 2] += noise;
    }
    ctx.putImageData(imageData, 0, 0);
  }
  applyVHS(ctx, w, h) {
    ctx.save();
    const glitchChance = this.config.intensity * 0.1;
    if (Math.random() < glitchChance) {
      const y = Math.random() * h;
      const sliceH = 2 + Math.random() * 10;
      const offset = (Math.random() - 0.5) * 20;
      const imgData = ctx.getImageData(0, y, w, sliceH);
      ctx.putImageData(imgData, offset, y);
    }
    ctx.globalCompositeOperation = "screen";
    ctx.globalAlpha = this.config.intensity * 0.1;
    ctx.fillStyle = "rgba(255, 0, 0, 0.05)";
    ctx.fillRect(2, 0, w, h);
    ctx.fillStyle = "rgba(0, 255, 255, 0.05)";
    ctx.fillRect(-2, 0, w, h);
    ctx.globalCompositeOperation = "multiply";
    ctx.globalAlpha = this.config.intensity * 0.15;
    for (let y = 0;y < h; y += 4) {
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fillRect(0, y, w, 2);
    }
    ctx.restore();
  }
  applyScanlines(ctx, w, h) {
    ctx.save();
    ctx.globalAlpha = this.config.intensity * 0.3;
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
    for (let y = 0;y < h; y += 3) {
      ctx.fillRect(0, y, w, 1);
    }
    ctx.restore();
  }
  applyCRT(ctx, w, h) {
    this.applyScanlines(ctx, w, h);
    ctx.save();
    const gradient = ctx.createRadialGradient(w / 2, h / 2, w * 0.35, w / 2, h / 2, w * 0.7);
    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(1, `rgba(0,0,0,${this.config.intensity * 0.5})`);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }
  applyNoise(ctx, w, h) {
    ctx.save();
    ctx.globalAlpha = this.config.intensity * 0.15;
    const blockSize = 4;
    for (let x = 0;x < w; x += blockSize) {
      for (let y = 0;y < h; y += blockSize) {
        const v = Math.floor(Math.random() * 255);
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(x, y, blockSize, blockSize);
      }
    }
    ctx.restore();
  }
  applyBokeh(ctx, w, h, data) {
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    const count = 8 + Math.floor(data.overallLevel * 10);
    for (let i = 0;i < count; i++) {
      const x = (Math.sin(this.time * 0.3 + i * 1.7) * 0.5 + 0.5) * w;
      const y = (Math.cos(this.time * 0.2 + i * 2.3) * 0.5 + 0.5) * h;
      const size = 20 + Math.sin(this.time + i) * 15 + data.bassLevel * 20;
      const alpha = 0.05 + data.overallLevel * 0.05;
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
      gradient.addColorStop(0, `rgba(162, 155, 254, ${alpha})`);
      gradient.addColorStop(0.7, `rgba(108, 92, 231, ${alpha * 0.3})`);
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// src/effects/BackgroundEngine.ts
class BackgroundEngine {
  config = {
    type: "gradient",
    solidColor: "#0a0a0f",
    gradientColors: ["#0a0a1a", "#1a0a2e", "#0a1a2e"],
    gradientAngle: 135,
    animatedSpeed: 0.5,
    image: null,
    imageFit: "cover",
    blur: 0,
    zoom: 1,
    kenBurns: false,
    parallax: false,
    reactToMusic: true
  };
  time = 0;
  kenBurnsPhase = 0;
  render(ctx, width, height, data) {
    this.time += 0.016;
    ctx.save();
    switch (this.config.type) {
      case "solid":
        ctx.fillStyle = this.config.solidColor;
        ctx.fillRect(0, 0, width, height);
        break;
      case "gradient":
        this.renderGradient(ctx, width, height, data);
        break;
      case "animated-gradient":
        this.renderAnimatedGradient(ctx, width, height, data);
        break;
      case "image":
        this.renderImage(ctx, width, height, data);
        break;
      case "blur":
        this.renderBlurBackground(ctx, width, height, data);
        break;
    }
    ctx.restore();
  }
  renderGradient(ctx, w, h, data) {
    const angle = this.config.gradientAngle * Math.PI / 180;
    const x0 = w / 2 + Math.cos(angle) * w / 2;
    const y0 = h / 2 + Math.sin(angle) * h / 2;
    const x1 = w / 2 - Math.cos(angle) * w / 2;
    const y1 = h / 2 - Math.sin(angle) * h / 2;
    const gradient = ctx.createLinearGradient(x0, y0, x1, y1);
    this.config.gradientColors.forEach((color, i) => {
      gradient.addColorStop(i / (this.config.gradientColors.length - 1), color);
    });
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }
  renderAnimatedGradient(ctx, w, h, data) {
    const speed = this.config.animatedSpeed;
    const angle = this.time * speed * 20 % 360;
    const rad = angle * Math.PI / 180;
    const cx = w / 2 + Math.cos(rad) * w * 0.3;
    const cy = h / 2 + Math.sin(rad) * h * 0.3;
    const radius = Math.max(w, h) * (0.8 + (this.config.reactToMusic ? data.bassLevel * 0.3 : 0));
    const gradient = ctx.createRadialGradient(cx, cy, 0, w / 2, h / 2, radius);
    this.config.gradientColors.forEach((color, i) => {
      const offset = (i / (this.config.gradientColors.length - 1) + this.time * speed * 0.01) % 1;
      gradient.addColorStop(Math.abs(offset), color);
    });
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }
  renderImage(ctx, w, h, data) {
    if (!this.config.image) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);
      return;
    }
    const img = this.config.image;
    let dx = 0, dy = 0, dw = w, dh = h;
    if (this.config.imageFit === "cover") {
      const imgRatio = img.width / img.height;
      const canvasRatio = w / h;
      if (imgRatio > canvasRatio) {
        dw = h * imgRatio;
        dx = (w - dw) / 2;
      } else {
        dh = w / imgRatio;
        dy = (h - dh) / 2;
      }
    }
    if (this.config.kenBurns) {
      this.kenBurnsPhase += 0.0005;
      const zoom = 1.1 + Math.sin(this.kenBurnsPhase) * 0.1;
      const panX = Math.sin(this.kenBurnsPhase * 0.7) * 20;
      const panY = Math.cos(this.kenBurnsPhase * 0.5) * 15;
      ctx.translate(w / 2 + panX, h / 2 + panY);
      ctx.scale(zoom, zoom);
      ctx.translate(-w / 2, -h / 2);
    }
    if (this.config.reactToMusic) {
      const zoomFactor = 1 + data.bassLevel * 0.02;
      ctx.translate(w / 2, h / 2);
      ctx.scale(zoomFactor, zoomFactor);
      ctx.translate(-w / 2, -h / 2);
    }
    ctx.drawImage(img, dx, dy, dw, dh);
    if (this.config.blur > 0) {
      ctx.filter = `blur(${this.config.blur}px)`;
      ctx.drawImage(ctx.canvas, 0, 0);
      ctx.filter = "none";
    }
  }
  renderBlurBackground(ctx, w, h, data) {
    const gradient = ctx.createLinearGradient(0, 0, w, h);
    gradient.addColorStop(0, "#1a1a2e");
    gradient.addColorStop(0.5, "#16213e");
    gradient.addColorStop(1, "#0f3460");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
  }
  loadImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image;
      const url = URL.createObjectURL(file);
      img.onload = () => {
        this.config.image = img;
        this.config.type = "image";
        resolve();
      };
      img.onerror = reject;
      img.src = url;
    });
  }
}

// src/ui/TextOverlay.ts
class TextOverlay {
  layers = [];
  time = 0;
  constructor() {
    this.layers = [
      {
        id: "title",
        config: {
          text: "Song Title",
          fontFamily: "Segoe UI",
          fontSize: 36,
          fontWeight: "700",
          color: "#ffffff",
          x: 0.5,
          y: 0.85,
          align: "center",
          animation: "none",
          glowColor: "#6c5ce7",
          glowIntensity: 0,
          shadow: true,
          reactToMusic: false,
          visible: true
        }
      },
      {
        id: "artist",
        config: {
          text: "Artist Name",
          fontFamily: "Segoe UI",
          fontSize: 18,
          fontWeight: "400",
          color: "#a0a0b0",
          x: 0.5,
          y: 0.9,
          align: "center",
          animation: "none",
          glowColor: "#a29bfe",
          glowIntensity: 0,
          shadow: false,
          reactToMusic: false,
          visible: true
        }
      }
    ];
  }
  render(ctx, width, height, data) {
    this.time += 0.016;
    for (const layer of this.layers) {
      if (!layer.config.visible || !layer.config.text)
        continue;
      this.renderTextLayer(ctx, width, height, layer, data);
    }
  }
  renderTextLayer(ctx, w, h, layer, data) {
    const cfg = layer.config;
    ctx.save();
    let x = cfg.x * w;
    let y = cfg.y * h;
    let alpha = 1;
    let scale = 1;
    switch (cfg.animation) {
      case "fade":
        alpha = 0.5 + Math.sin(this.time * 2) * 0.5;
        break;
      case "slide":
        x += Math.sin(this.time) * 20;
        break;
      case "zoom":
        scale = 1 + Math.sin(this.time * 1.5) * 0.1;
        break;
      case "bounce":
        y += Math.abs(Math.sin(this.time * 3)) * -15;
        break;
      case "pulse":
        scale = 1 + data.bassLevel * 0.15;
        break;
      case "neon":
        cfg.glowIntensity = 0.5 + Math.sin(this.time * 4) * 0.5;
        break;
      case "glitch":
        if (Math.random() > 0.95) {
          x += (Math.random() - 0.5) * 10;
          y += (Math.random() - 0.5) * 5;
        }
        break;
    }
    if (cfg.reactToMusic) {
      scale += data.bassLevel * 0.05;
    }
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.font = `${cfg.fontWeight} ${cfg.fontSize}px ${cfg.fontFamily}`;
    ctx.textAlign = cfg.align;
    ctx.textBaseline = "middle";
    if (cfg.glowIntensity > 0) {
      ctx.shadowBlur = cfg.glowIntensity * 20;
      ctx.shadowColor = cfg.glowColor;
    }
    if (cfg.shadow) {
      ctx.shadowBlur = 4;
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
    }
    ctx.fillStyle = cfg.color;
    ctx.fillText(cfg.text, 0, 0);
    ctx.restore();
  }
  setTitle(text) {
    const layer = this.layers.find((l) => l.id === "title");
    if (layer)
      layer.config.text = text;
  }
  setArtist(text) {
    const layer = this.layers.find((l) => l.id === "artist");
    if (layer)
      layer.config.text = text;
  }
  getLayer(id) {
    return this.layers.find((l) => l.id === id);
  }
  addLayer(id, config) {
    const defaultConfig = {
      text: "",
      fontFamily: "Segoe UI",
      fontSize: 24,
      fontWeight: "400",
      color: "#ffffff",
      x: 0.5,
      y: 0.5,
      align: "center",
      animation: "none",
      glowColor: "#6c5ce7",
      glowIntensity: 0,
      shadow: false,
      reactToMusic: false,
      visible: true
    };
    this.layers.push({ id, config: { ...defaultConfig, ...config } });
  }
  removeLayer(id) {
    this.layers = this.layers.filter((l) => l.id !== id);
  }
  getLayers() {
    return this.layers;
  }
}

// src/export/ExportEngine.ts
class ExportEngine {
  config = {
    format: "webm",
    codec: "vp9",
    fps: 30,
    resolution: { width: 1920, height: 1080, label: "1080p" },
    quality: 0.9,
    filename: "visual-spectrum"
  };
  mediaRecorder = null;
  chunks = [];
  isRecording = false;
  onProgress = null;
  startTime = 0;
  static RESOLUTIONS = [
    { width: 1280, height: 720, label: "720p" },
    { width: 1920, height: 1080, label: "1080p" },
    { width: 2560, height: 1440, label: "1440p" },
    { width: 3840, height: 2160, label: "4K" }
  ];
  startRecording(canvas, onProgress) {
    this.onProgress = onProgress || null;
    this.chunks = [];
    this.startTime = performance.now();
    const mimeType = this.getMimeType();
    const stream = canvas.captureStream(this.config.fps);
    try {
      this.mediaRecorder = new MediaRecorder(stream, {
        mimeType,
        videoBitsPerSecond: this.getBitrate()
      });
    } catch (e) {
      this.mediaRecorder = new MediaRecorder(stream, {
        mimeType: "video/webm",
        videoBitsPerSecond: this.getBitrate()
      });
    }
    this.mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) {
        this.chunks.push(e.data);
      }
    };
    this.mediaRecorder.onstop = () => {
      this.finalize();
    };
    this.mediaRecorder.start(100);
    this.isRecording = true;
    if (this.onProgress) {
      this.onProgress({
        status: "rendering",
        progress: 0,
        currentFrame: 0,
        totalFrames: 0,
        elapsedTime: 0,
        estimatedRemaining: 0
      });
    }
  }
  stopRecording() {
    if (this.mediaRecorder && this.isRecording) {
      this.mediaRecorder.stop();
      this.isRecording = false;
    }
  }
  finalize() {
    const mimeType = this.getMimeType();
    const blob = new Blob(this.chunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${this.config.filename}.${this.getExtension()}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    if (this.onProgress) {
      this.onProgress({
        status: "complete",
        progress: 1,
        currentFrame: 0,
        totalFrames: 0,
        elapsedTime: performance.now() - this.startTime,
        estimatedRemaining: 0
      });
    }
  }
  getMimeType() {
    switch (this.config.format) {
      case "mp4":
        return "video/mp4";
      case "webm":
        return this.config.codec === "vp9" ? "video/webm;codecs=vp9" : "video/webm;codecs=vp8";
      default:
        return "video/webm";
    }
  }
  getExtension() {
    return this.config.format === "gif" ? "gif" : this.config.format;
  }
  getBitrate() {
    const { width, height } = this.config.resolution;
    const pixels = width * height;
    return Math.floor(pixels * this.config.quality * 8);
  }
  getIsRecording() {
    return this.isRecording;
  }
  updateProgress(currentTime, totalDuration) {
    if (!this.onProgress || !this.isRecording)
      return;
    const progress = currentTime / totalDuration;
    const elapsed = performance.now() - this.startTime;
    const estimated = progress > 0 ? elapsed / progress - elapsed : 0;
    this.onProgress({
      status: "rendering",
      progress,
      currentFrame: Math.floor(currentTime * this.config.fps),
      totalFrames: Math.floor(totalDuration * this.config.fps),
      elapsedTime: elapsed,
      estimatedRemaining: estimated
    });
  }
}

// src/ai/AIAssistant.ts
class AIAssistant {
  analysisHistory = [];
  analysisComplete = false;
  analyze(data) {
    this.analysisHistory.push({
      bass: data.bassLevel,
      mid: data.midLevel,
      treble: data.trebleLevel,
      bpm: data.bpm
    });
    if (this.analysisHistory.length > 300) {
      this.analysisComplete = true;
    }
  }
  getRecommendation() {
    if (this.analysisHistory.length === 0) {
      return this.getDefaultRecommendation();
    }
    const avgBass = this.average(this.analysisHistory.map((h) => h.bass));
    const avgMid = this.average(this.analysisHistory.map((h) => h.mid));
    const avgTreble = this.average(this.analysisHistory.map((h) => h.treble));
    const avgBpm = this.average(this.analysisHistory.map((h) => h.bpm).filter((b) => b > 0));
    const energy = this.classifyEnergy(avgBass, avgMid, avgTreble, avgBpm);
    const mood = this.classifyMood(avgBass, avgMid, avgTreble);
    const genre = this.classifyGenre(avgBass, avgMid, avgTreble, avgBpm);
    return this.buildRecommendation(energy, mood, genre, avgBpm);
  }
  classifyEnergy(bass, mid, treble, bpm) {
    const total = (bass + mid + treble) / 3;
    if (total > 0.6 && bpm > 130)
      return "high";
    if (total > 0.4 && bpm > 100)
      return "medium";
    return "low";
  }
  classifyMood(bass, mid, treble) {
    if (bass > mid && bass > treble)
      return "dark";
    if (treble > bass && treble > mid)
      return "bright";
    if (mid > bass * 1.2)
      return "warm";
    return "neutral";
  }
  classifyGenre(bass, mid, treble, bpm) {
    if (bpm > 140 && bass > 0.5)
      return "EDM";
    if (bpm > 130 && bass > 0.6)
      return "Trap";
    if (bpm > 100 && bpm < 130 && mid > 0.4)
      return "Pop";
    if (bpm < 100 && bass < 0.3)
      return "Ambient";
    if (bpm < 90 && mid > 0.3)
      return "Lo-Fi";
    if (bass > 0.5 && mid > 0.4)
      return "Hip-Hop";
    if (treble > 0.5 && mid > 0.4)
      return "Rock";
    return "Electronic";
  }
  buildRecommendation(energy, mood, genre, bpm) {
    let template = "chill";
    let visualizer = "vertical-bars";
    let colors = ["#6c5ce7", "#a29bfe", "#ffffff"];
    let particles = "dust";
    let background = "gradient";
    switch (energy) {
      case "high":
        template = genre === "EDM" ? "edm" : "ncs";
        visualizer = genre === "EDM" ? "particle-burst" : "neon";
        colors = ["#ff0080", "#7700ff", "#00f5ff"];
        particles = "sparks";
        background = "solid";
        break;
      case "medium":
        template = genre === "Pop" ? "spotify" : "monstercat";
        visualizer = "vertical-bars";
        colors = ["#6c5ce7", "#a29bfe", "#00f5ff"];
        particles = "dust";
        background = "gradient";
        break;
      case "low":
        template = genre === "Ambient" ? "ambient" : "lofi";
        visualizer = genre === "Ambient" ? "energy-ring" : "waveform";
        colors = ["#4facfe", "#00f2fe", "#ffffff"];
        particles = "fireflies";
        background = "animated-gradient";
        break;
    }
    if (mood === "dark") {
      colors = ["#8b0000", "#4a0080", "#000033"];
    } else if (mood === "bright") {
      colors = ["#ffdd00", "#ff6600", "#ff0066"];
    }
    const youtubeTitle = this.generateTitle(genre, mood, energy);
    const hashtags = this.generateHashtags(genre, mood);
    const description = this.generateDescription(genre, mood, energy, bpm);
    return {
      template,
      visualizer,
      colors,
      particles,
      background,
      mood,
      energy,
      genre,
      youtubeTitle,
      hashtags,
      description
    };
  }
  generateTitle(genre, mood, energy) {
    const moodWords = {
      dark: ["Dark", "Deep", "Midnight", "Shadow"],
      bright: ["Bright", "Radiant", "Solar", "Golden"],
      warm: ["Warm", "Sunset", "Autumn", "Ember"],
      neutral: ["Crystal", "Flow", "Wave", "Echo"]
    };
    const word = moodWords[mood]?.[Math.floor(Math.random() * 4)] || "Visual";
    return `${word} ${genre} Mix | ${energy === "high" ? "Energy" : energy === "low" ? "Chill" : "Vibes"} Visualizer`;
  }
  generateHashtags(genre, mood) {
    return [
      `#${genre.replace(/\s/g, "")}`,
      "#MusicVisualizer",
      "#Spectrum",
      `#${mood}vibes`,
      "#AudioVisual",
      "#SpectrumMaker",
      `#${genre.replace(/\s/g, "")}Music`,
      "#Visualizer",
      "#MusicVideo"
    ];
  }
  generateDescription(genre, mood, energy, bpm) {
    return `${genre} music visualization | ${mood} mood | ${energy} energy | ~${Math.round(bpm)} BPM
` + `Created with Visual Spectrum Maker PRO

` + `Genre: ${genre}
Mood: ${mood}
Energy: ${energy}
BPM: ~${Math.round(bpm)}`;
  }
  getDefaultRecommendation() {
    return {
      template: "spotify",
      visualizer: "vertical-bars",
      colors: ["#6c5ce7", "#a29bfe", "#ffffff"],
      particles: "dust",
      background: "gradient",
      mood: "neutral",
      energy: "medium",
      genre: "Electronic",
      youtubeTitle: "Music Visualizer | Spectrum Animation",
      hashtags: ["#MusicVisualizer", "#Spectrum", "#AudioVisual"],
      description: "Music visualization created with Visual Spectrum Maker PRO"
    };
  }
  average(arr) {
    if (arr.length === 0)
      return 0;
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  }
  isReady() {
    return this.analysisComplete;
  }
  reset() {
    this.analysisHistory = [];
    this.analysisComplete = false;
  }
}

// src/main.ts
class VisualSpectrumMakerPRO {
  audioEngine;
  canvas;
  ctx;
  animationFrame = 0;
  visualizers = new Map;
  activeVisualizer = "vertical-bars";
  particleEngine;
  lightingEffects;
  cameraEffects;
  overlayEffects;
  backgroundEngine;
  textOverlay;
  templateManager;
  exportEngine;
  aiAssistant;
  panelManager;
  isInitialized = false;
  audioLoaded = false;
  constructor() {
    this.canvas = document.getElementById("preview-canvas");
    this.ctx = this.canvas.getContext("2d");
    this.audioEngine = new AudioEngine;
    this.particleEngine = new ParticleEngine(this.canvas.width, this.canvas.height);
    this.lightingEffects = new LightingEffects;
    this.cameraEffects = new CameraEffects;
    this.overlayEffects = new OverlayEffects;
    this.backgroundEngine = new BackgroundEngine;
    this.textOverlay = new TextOverlay;
    this.templateManager = new TemplateManager;
    this.exportEngine = new ExportEngine;
    this.aiAssistant = new AIAssistant;
    this.panelManager = new PanelManager;
    this.initialize();
  }
  async initialize() {
    this.resizeCanvas();
    window.addEventListener("resize", () => this.resizeCanvas());
    this.initializeVisualizers();
    this.particleEngine.initialize();
    this.setupEventListeners();
    this.panelManager.showPanel("dashboard");
    this.isInitialized = true;
    this.startRenderLoop();
  }
  resizeCanvas() {
    const container = document.getElementById("canvas-container");
    this.canvas.width = container.clientWidth;
    this.canvas.height = container.clientHeight;
    this.particleEngine.resize(this.canvas.width, this.canvas.height);
    this.visualizers.forEach((v) => v.resize(this.canvas.width, this.canvas.height));
  }
  initializeVisualizers() {
    const w = this.canvas.width;
    const h = this.canvas.height;
    this.visualizers.set("vertical-bars", new VerticalBarsVisualizer(this.ctx, w, h));
    this.visualizers.set("circular", new CircularSpectrumVisualizer(this.ctx, w, h));
    this.visualizers.set("waveform", new WaveformVisualizer(this.ctx, w, h));
    this.visualizers.set("neon", new NeonSpectrumVisualizer(this.ctx, w, h));
    this.visualizers.set("mirror-bars", new MirrorBarsVisualizer(this.ctx, w, h));
    this.visualizers.set("particle-burst", new ParticleBurstVisualizer(this.ctx, w, h));
    this.visualizers.set("energy-ring", new EnergyRingVisualizer(this.ctx, w, h));
  }
  setupEventListeners() {
    document.querySelectorAll(".nav-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        document.querySelectorAll(".nav-btn").forEach((b) => b.classList.remove("active"));
        e.target.classList.add("active");
        const panel = e.target.dataset.panel;
        if (panel)
          this.panelManager.showPanel(panel);
        this.rebindPanelEvents();
      });
    });
    document.getElementById("btn-play").addEventListener("click", () => this.play());
    document.getElementById("btn-pause").addEventListener("click", () => this.pause());
    document.getElementById("btn-stop").addEventListener("click", () => this.stop());
    document.getElementById("seek-bar").addEventListener("input", (e) => {
      const value = parseFloat(e.target.value);
      const time = value / 100 * this.audioEngine.getDuration();
      this.audioEngine.seek(time);
    });
    const container = document.getElementById("canvas-container");
    const overlay = document.getElementById("canvas-overlay");
    container.addEventListener("dragover", (e) => {
      e.preventDefault();
      overlay.classList.add("active");
    });
    container.addEventListener("dragleave", () => overlay.classList.remove("active"));
    container.addEventListener("drop", (e) => {
      e.preventDefault();
      overlay.classList.remove("active");
      this.handleDrop(e);
    });
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT")
        return;
      switch (e.key) {
        case " ":
          e.preventDefault();
          this.audioEngine.getIsPlaying() ? this.pause() : this.play();
          break;
        case "s":
          this.stop();
          break;
        case "r":
          this.toggleRecording();
          break;
        case "1":
          this.setVisualizer("vertical-bars");
          break;
        case "2":
          this.setVisualizer("circular");
          break;
        case "3":
          this.setVisualizer("waveform");
          break;
        case "4":
          this.setVisualizer("neon");
          break;
        case "5":
          this.setVisualizer("mirror-bars");
          break;
        case "6":
          this.setVisualizer("particle-burst");
          break;
        case "7":
          this.setVisualizer("energy-ring");
          break;
      }
    });
    this.rebindPanelEvents();
  }
  rebindPanelEvents() {
    setTimeout(() => {
      this.bindAudioControls();
      this.bindVisualizerSelection();
      this.bindBackgroundControls();
      this.bindParticleControls();
      this.bindEffectsControls();
      this.bindTextControls();
      this.bindTemplateSelection();
      this.bindExportControls();
      this.bindAIControls();
      this.bindAudioFileInput();
    }, 50);
  }
  bindAudioFileInput() {
    const audioInput = document.getElementById("audio-input");
    const dropZone = document.getElementById("audio-drop");
    if (audioInput) {
      audioInput.addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        if (file)
          this.loadAudio(file);
      });
    }
    if (dropZone) {
      dropZone.addEventListener("click", () => audioInput?.click());
    }
  }
  bindAudioControls() {
    this.bindSlider("ctrl-sensitivity", "val-sensitivity", (v) => this.audioEngine.setSensitivity(v));
    this.bindSlider("ctrl-gain", "val-gain", (v) => this.audioEngine.setGain(v));
    this.bindSlider("ctrl-smoothing", "val-smoothing", (v) => this.audioEngine.setSmoothing(v));
    this.bindSlider("ctrl-beat", "val-beat", (v) => this.audioEngine.setBeatThreshold(v));
  }
  bindVisualizerSelection() {
    document.querySelectorAll("[data-viz]").forEach((item) => {
      item.addEventListener("click", (e) => {
        document.querySelectorAll("[data-viz]").forEach((i) => i.classList.remove("active"));
        e.currentTarget.classList.add("active");
        const viz = e.currentTarget.dataset.viz;
        this.setVisualizer(viz);
      });
    });
    const color1 = document.getElementById("viz-color1");
    const color2 = document.getElementById("viz-color2");
    const color3 = document.getElementById("viz-color3");
    if (color1)
      color1.addEventListener("input", () => this.updateVisualizerColors());
    if (color2)
      color2.addEventListener("input", () => this.updateVisualizerColors());
    if (color3)
      color3.addEventListener("input", () => this.updateVisualizerColors());
    this.bindSlider("ctrl-barcount", "val-barcount", (v) => {
      const viz = this.visualizers.get(this.activeVisualizer);
      if (viz)
        viz.config.barCount = v;
    });
    this.bindSlider("ctrl-barwidth", "val-barwidth", (v) => {
      const viz = this.visualizers.get(this.activeVisualizer);
      if (viz)
        viz.config.barWidth = v;
    });
    this.bindSlider("ctrl-bargap", "val-bargap", (v) => {
      const viz = this.visualizers.get(this.activeVisualizer);
      if (viz)
        viz.config.barGap = v;
    });
    this.bindSlider("ctrl-reactivity", "val-reactivity", (v) => {
      const viz = this.visualizers.get(this.activeVisualizer);
      if (viz)
        viz.config.reactivity = v;
    });
    this.bindSlider("ctrl-glow", "val-glow", (v) => {
      const viz = this.visualizers.get(this.activeVisualizer);
      if (viz)
        viz.config.glowIntensity = v;
    });
    const mirrorCb = document.getElementById("viz-mirror");
    if (mirrorCb)
      mirrorCb.addEventListener("change", () => {
        const viz = this.visualizers.get(this.activeVisualizer);
        if (viz)
          viz.config.mirrorMode = mirrorCb.checked;
